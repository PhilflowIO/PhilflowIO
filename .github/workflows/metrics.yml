name: Metrics
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Main overview card
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_isocalendar: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          config_timezone: Europe/Berlin

      # Activity & contributions detail card
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-activity.svg
          base: ""
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_followup: yes
          plugin_followup_sections: user, repositories
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 30
          plugin_activity_filter: commit, issue, pr, review, comment
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          config_timezone: Europe/Berlin
